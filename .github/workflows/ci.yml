name: Go CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Download Dependencies
        run: go mod tidy

      - name: Build Application
        run: go build -v ./...

      - name: Run Tests
        run: go test -v ./...